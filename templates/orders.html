<!DOCTYPE html>
<html>
<head>
    <title>Your Booked Tickets</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f3f6fa;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #1e1e1e;
            margin-bottom: 40px;
        }

        .ticket {
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            border-left: 6px solid #2196f3;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            position: relative;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQW__LeJsnrSCy0twaCt-Mb8ew21k1ob41nZg&s");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;
        }

        .ticket-content {
            background-color: #fffdfdd9; /* semi-transparent white layer for readability */
            padding: 20px;
            border-radius: 10px;
        }

        .ticket label {
            font-weight: bold;
            color: #222;
        }

        .ticket div {
            margin: 6px 0;
            font-size: 15px;
        }

        .back-button {
            display: block;
            width: 200px;
            margin: 40px auto 10px;
            padding: 12px;
            background-color: #007bff;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: #0056b3;
        }

        p {
            text-align: center;
            color: #888;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>Your Booked Tickets</h2>

    {% if bookings %}
        {% for b in bookings %}
            <div class="ticket">
                <div class="ticket-content">
                    <div><label>User:</label> {{ user[1] }}</div>
                    <div><label>Email:</label> {{ user[3] }}</div>
                    <div><label>Phone:</label> {{ user[2] }}</div>
                    <div><label>Match:</label> {{ b[4] }} vs {{ b[5] }}</div>
                    <div><label>Match Date:</label> {{ b[3] }}</div>
                    <div><label>Stand No:</label> {{ b[1] }}</div>
                    <div><label>Price:</label> ₹{{ b[2] }}</div>
                    <div><label>Payment ID:</label> {{ b[0] }}</div>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p>No bookings yet.</p>
    {% endif %}

    <a href="/dashboard" class="back-button">← Back to Dashboard</a>
</body>
</html>
